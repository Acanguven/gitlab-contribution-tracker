name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - arch: arm64
            python-arch: arm64
          - arch: x86_64
            python-arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.python-arch }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app bundle
        run: python setup.py py2app --no-strip 2>/dev/null || python setup.py py2app

      - name: Create zip archive
        run: |
          cd dist
          zip -r "../GitLab-Tracker-${{ matrix.arch }}.zip" "GitLab Tracker.app"

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.arch }}
          path: "GitLab-Tracker-${{ matrix.arch }}.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        run: |
          curl -fSL -o arm64.zip "https://github.com/Acanguven/gitlab-contribution-tracker/releases/download/v${{ steps.version.outputs.tag }}/GitLab-Tracker-arm64.zip"
          curl -fSL -o x86_64.zip "https://github.com/Acanguven/gitlab-contribution-tracker/releases/download/v${{ steps.version.outputs.tag }}/GitLab-Tracker-x86_64.zip"

      - name: Compute SHA256
        id: sha
        run: |
          echo "arm64=$(sha256sum arm64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(sha256sum x86_64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: Acanguven/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}

      - name: Update cask formula
        run: |
          cat > Casks/gitlab-contribution-tracker.rb << 'CASK'
          cask "gitlab-contribution-tracker" do
            version "${{ steps.version.outputs.tag }}"

            on_arm do
              url "https://github.com/Acanguven/gitlab-contribution-tracker/releases/download/v#{version}/GitLab-Tracker-arm64.zip"
              sha256 "${{ steps.sha.outputs.arm64 }}"
            end

            on_intel do
              url "https://github.com/Acanguven/gitlab-contribution-tracker/releases/download/v#{version}/GitLab-Tracker-x86_64.zip"
              sha256 "${{ steps.sha.outputs.x86_64 }}"
            end

            name "GitLab Contribution Tracker"
            desc "macOS menu bar app that tracks daily GitLab push events"
            homepage "https://github.com/Acanguven/gitlab-contribution-tracker"

            app "GitLab Tracker.app"

            auto_updates true

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/GitLab Tracker.app"]
              system_command "/usr/bin/osascript",
                             args: ["-e", 'tell application "System Events" to make login item at end with properties {path:"/Applications/GitLab Tracker.app", hidden:true}']
              system_command "/usr/bin/open",
                             args: ["#{appdir}/GitLab Tracker.app"]
            end

            uninstall_postflight do
              system_command "/usr/bin/osascript",
                             args: ["-e", 'tell application "System Events" to delete login item "GitLab Tracker"'],
                             must_succeed: false
            end

            zap trash: "~/.config/gitlab-contribution-tracker"
          end
          CASK
          sed -i 's/^          //' Casks/gitlab-contribution-tracker.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/gitlab-contribution-tracker.rb
          git commit -m "Update gitlab-contribution-tracker to ${{ steps.version.outputs.tag }}"
          git push
